<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="popup.css">
    <title>Chrome DOM Bridge</title>
  </head>
  <body>
    <main class="panel">
      <header class="header">
        <div>
          <h1>Chrome DOM Bridge</h1>
          <p id="summary">状態を確認しています</p>
        </div>
        <span id="statusDot" class="status-dot status-checking" aria-hidden="true"></span>
      </header>

      <dl class="status-list">
        <div>
          <dt>ローカルアプリ</dt>
          <dd id="daemonStatus">確認中</dd>
        </div>
        <div>
          <dt>Chrome拡張</dt>
          <dd id="extensionStatus">確認中</dd>
        </div>
      </dl>

      <div class="actions">
        <button id="refreshButton" type="button">再確認</button>
        <button id="downloadButton" type="button">ダウンロード</button>
      </div>

      <details id="setupPanel" class="setup-panel" hidden>
        <summary>macOS セットアップ</summary>
        <p>ターミナルで実行してください。</p>
        <div class="command-block">
          <label for="installCommand">インストール</label>
          <pre><code id="installCommand"></code></pre>
          <button id="copyInstallButton" type="button">インストールコマンドをコピー</button>
        </div>
        <div class="command-block">
          <label for="startCommand">起動</label>
          <pre><code id="startCommand"></code></pre>
          <button id="copyStartButton" type="button">起動コマンドをコピー</button>
        </div>
        <div class="command-block">
          <label for="stopCommand">停止</label>
          <pre><code id="stopCommand"></code></pre>
          <button id="copyStopButton" type="button">停止コマンドをコピー</button>
        </div>
      </details>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
